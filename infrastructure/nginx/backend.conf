server {
    server_name api.noytrixapp.com;


    location /trader-api/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Headers "X-Noytrix-Session,X-Noytrix-Device-Id,Content-Type,Authorization" always;
            add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
            return 204;
        }

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Headers "X-Noytrix-Session,X-Noytrix-Device-Id,Content-Type,Authorization" always;
        add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Noytrix-Session,X-Noytrix-Device-Id,x-app-key" always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
            return 204;
        }

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Noytrix-Session,X-Noytrix-Device-Id,x-app-key" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.noytrixapp.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.noytrixapp.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = api.noytrixapp.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.noytrixapp.com;
    return 404; # managed by Certbot


}
